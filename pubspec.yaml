name: srm_client
description: An unofficial SRM University client app for viewing academic data.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client with interceptors for web scraping
  dio: ^5.4.0
  cookie_jar: ^4.0.0
  dio_cookie_manager: ^3.1.0

  # DOM/HTML parsing for scraping portal responses
  html: ^0.15.4

  # Encrypted storage for session cookies (no plaintext credential storage)
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.1

  # Date/time formatting
  intl: ^0.18.1

  # Open external links (e.g., university portal)
  url_launcher: ^6.2.4
  google_fonts: ^6.1.0

  cupertino_icons: ^1.0.6
  local_auth: ^2.3.0
  shared_preferences: ^2.5.3
  flutter_inappwebview: ^6.1.5
  workmanager: ^0.7.0
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
